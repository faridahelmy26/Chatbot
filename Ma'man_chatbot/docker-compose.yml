version: '3.8'

services:
  chatbot:
    build: .
    container_name: maman-chatbot
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/maman.db
      - LOG_LEVEL=INFO
      - RATE_LIMIT=10/minute
      - ENABLE_RATE_LIMIT=true
      - ALLOWED_ORIGINS=*
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      